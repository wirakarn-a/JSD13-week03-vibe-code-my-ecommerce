<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <body style="background-color: #64313e;"></body>
    <center>
        <div style="
            width:70%;
            margin:30px auto;
            background-color: #f4f3ee;
            border-radius:25px;
            padding:30px;>
        ">

        <h1 style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; color:#64313e;">Registration Form</h1>
        <form action="/api/order" method="post">
        <label>
            Username
            <input id="cusername" type="text" name="cusername" placeholder="kittyinwonderland" required/>
        </label>
        <label>
            Password
            <input id="cpassword" type="password" name="cpassword" required/>
        </label>

        <br><br>
        <hr>

        <h3 style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; color:#64313e;">Contact Details</h3>
        <label>
            <p>Full Name</p>
            <input id="cname" type="text" name="cname" required/>
        </label>
        <label>
            <p>Phone Number</p>
            <input id="cphone" type="text" name="cphone" required/>
        </label>
        <label>
            <p>Email Address</p>
            <input id="cemail" type="text" name="cemail" required/>
        </label>
        <label>
            <p>Birth Date</p>
            <input id="cbirthdate" type="date" name="cbirthdate"/>
        </label>

        <p>Gender</p>
            <label for="">
                Male
                <input type="radio" name="gender" />
            </label>
            <label>
                Female
                <input type="radio" name="gender" />
            </label>
            <label>
                Prefer not to say
                <input type="radio" name="gender" />
            </label>
        
        <br><br>
        <hr>

        <h3 style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; color:#64313e;">Choose a plan</h3>
        <label for="">
                Free
                <input type="radio" name="plan" />
            </label>
            <label>
                Premium
                <input type="radio" name="plan" />
            </label>

        <br><br>
        <hr>

        <h3 style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; color:#64313e;">Create a New Interest</h3>
        <label>
            Movie
            <input type="checkbox" name="fruit" value="strawberry"/>
        </label>

        <label>
            Music
            <input type="checkbox" name="fruit" value="Coconut"/>
        </label>

        <label>
            Game
            <input type="checkbox" name="fruit" value="Coconut"/>
        </label>
        <br><br>

        <br><br>
        <button 
            type="submit"
            style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; color:#64313e; font-size:large;">&#127804 REGISTER &#127804
        </button>
        </div>
    </center>
    </form>

</body>
</html>
